<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Drop Shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a61a29"/>
      <stop offset="100%" stop-color="#690d18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8cd7a"/>
      <stop offset="50%" stop-color="#d1ae53"/>
      <stop offset="100%" stop-color="#ab852b"/>
    </linearGradient>
  </defs>

  <!-- Red Shield -->
  <path d="M 50 5 L 12 18 L 12 55 C 12 78 38 92 50 96 C 62 92 88 78 88 55 L 88 18 Z" fill="url(#shieldGrad)" filter="url(#shadow)" />
  <path d="M 50 8 L 15 20 L 15 54 C 15 75 39 88 50 92 C 61 88 85 75 85 54 L 85 20 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2" />

  <!-- Gold Scale SVG => Wait, they requested gavel on red background -->
  <g fill="url(#goldGrad)" transform="translate(0, 5) scale(0.9)" filter="url(#shadow)">
    <!-- Base -->
    <path d="M 35 70 L 65 70 L 65 74 L 35 74 Z" />
    <path d="M 30 76 L 70 76 L 70 82 L 30 82 Z" rx="2" ry="2" />
    <path d="M 25 84 L 75 84 L 75 90 L 25 90 Z" rx="2" ry="2" />

    <!-- Gavel -->
    <g transform="rotate(45, 50, 45)">
      <!-- Handle -->
      <path d="M 46 35 L 54 35 L 52 75 L 48 75 Z" />
      <circle cx="50" cy="75" r="3" />
      <!-- Head Details -->
      <rect x="30" y="20" width="40" height="15" rx="2" ry="2" />
      <!-- Left knob -->
      <rect x="25" y="22" width="5" height="11" rx="1" ry="1" />
      <!-- Right knob -->
      <rect x="70" y="22" width="5" height="11" rx="1" ry="1" />
    </g>
  </g>
</svg>
